# Publishes a GitHub Release when a version tag is pushed (by `bun run release`, which cuts the
# git-flow release and pushes the bare-semver tag — git-flow's versiontag prefix is empty here).
# It builds the production bundle as a CI gate, attaches it as a downloadable asset, and lets
# GitHub auto-generate the notes from the merged PRs/commits since the previous tag. Pushing main
# in the same step also fires deploy-demo.yml — together they ship the Pages demo and the release.
name: release
on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to (re)publish a release for
        required: true
permissions:
  contents: write # create the release + upload the asset
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Route the (potentially untrusted) tag through env vars in every `run:` step rather than
      # interpolating ${{ }} straight into the shell — the standard guard against Actions script
      # injection. `with:`/`env:` sinks are safe to interpolate; only shell `run:` bodies are not.
      - name: Resolve the tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "name=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.name }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Package the built bundle
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: cd dist && zip -r "../vwing-${TAG}.zip" .
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.name }}
        run: >
          gh release create "$TAG"
          --title "v$TAG"
          --generate-notes
          --verify-tag
          "vwing-${TAG}.zip"
