# Deploys the built demo to GitHub Pages on every push to main.
# The demo is the offline campaign (client-side vs. the bot); Pages is static,
# so the online lobby has no server here. The build's absolute URLs (manifest,
# icons, OG image, SW precache) resolve against VWING_SITE_URL — it must match
# the Pages origin, not the kapsi default.
name: deploy-demo
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          VWING_SITE_URL: https://relicode.github.io/vwing/
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
