# V-Wing stack: the Bun game server behind Traefik, with Redis for authoritative
# game/lobby state. Compose Spec (no obsolete `version:` key).
#
# This base file is PRODUCTION-SAFE: only Traefik publishes a host port (80), and Redis sits on
# an internal-only network (no host port, no internet egress, reachable solely by the app — not
# even by the socket-mounting Traefik). Exposure for local development is layered on by
# compose.override.yaml (loopback Redis), which Compose loads automatically for `docker compose
# up` but NOT when you pass -f files explicitly.
#
#   Local dev (one command):  docker compose up -d --build        (bun run stack)
#   Just the shared Redis:     docker compose up -d redis          (bun run redis)
#   Production (TLS, locked):  docker compose -f compose.yaml -f compose.prod.yaml up -d
#                                                                  (bun run stack:prod)
#
# Config via env (Compose auto-reads ./.env — see .env.example):
#   APP_DOMAIN   host Traefik routes the app on   (default: localhost)
#   ACME_EMAIL   email for Let's Encrypt          (production TLS only)

name: vwing

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vwing:latest
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 8787 # the Bun server serves HTTP, the static client AND the /ws socket on this one port
    depends_on:
      redis:
        condition: service_healthy
    networks: [web, internal] # `web` to be reached by Traefik; `internal` to reach Redis
    # No host ports: the app is reached only through Traefik. Because HTTP and /ws share one
    # origin, the proxy carries the WebSocket too — production needs nothing but Traefik open.
    # Healthcheck is baked into the image (HEALTHCHECK in the Dockerfile, hitting /api/health).
    labels:
      traefik.enable: "true"
      traefik.docker.network: vwing_web # the app is multi-homed — tell Traefik which net to dial
      traefik.http.routers.vwing.rule: Host(`${APP_DOMAIN:-localhost}`)
      traefik.http.routers.vwing.entrypoints: web
      traefik.http.services.vwing.loadbalancer.server.port: "8787"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Durable: append-only log + an hourly RDB snapshot, persisted to the ./data bind-mount.
    # The redis entrypoint chowns /data to uid 999 (only when it starts as root, the default
    # here), so after a run ./data + ./data/.gitignore are owned by uid 999 — cleaning them from
    # the host may need sudo. On SELinux/rootless hosts add a `:z`/`:Z` relabel or a `user:` map.
    # No host port here — compose.override.yaml publishes it on loopback for dev.
    command: ["redis-server", "--appendonly", "yes", "--save", "3600", "1"]
    volumes:
      - ./data:/data
    networks: [internal] # isolated: no host port, no egress, unreachable by Traefik
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 3s

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    # HTTP only here; compose.prod.yaml REPLACES this command to add the HTTPS entrypoint + ACME.
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --entryPoints.web.address=:80
    ports:
      - "80:80"
    networks: [web] # only the public network — never the internal one Redis lives on
    volumes:
      # Read-only Docker socket so Traefik can watch container labels. For a hardened setup,
      # front this with a docker-socket-proxy instead of mounting it directly.
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  web:
    name: vwing_web
  internal:
    name: vwing_internal
    internal: true # no gateway: containers here have no inbound/outbound host or internet access
